<script>
async function getScores() {
  try {
    const res = await fetch("https://site.api.espn.com/apis/v2/sports/basketball/nba/scoreboard");
    const data = await res.json();

    let output = "";

    const games = data.events.slice(0, 5);

    games.forEach(game => {
      const comp = game.competitions[0];
      const home = comp.competitors[0];
      const away = comp.competitors[1];

      output += `
        <p>
          ${home.team.displayName} ${home.score}
          vs
          ${away.team.displayName} ${away.score}
        </p>
      `;
    });

    document.getElementById("scores").innerHTML = output;

  } catch (err) {
    document.getElementById("scores").innerHTML = "Error loading data";
    console.error(err);
  }
}

getScores();
</script>
