<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mastanicks API House</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Rye&family=Spline+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Live board</p>
        <h1>Mastanicks API House</h1>
      </div>
      <p id="updated" class="updated">Syncing data</p>
    </header>

    <section class="grid" aria-label="Market and sports dashboard">
      <article class="panel market-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Crypto</p>
            <h2>Market Watch</h2>
          </div>
          <span id="crypto-status" class="status">Loading</span>
        </div>
        <div id="crypto-list" class="stack"></div>
      </article>

      <article class="panel sports-panel">
        <div class="panel-heading">
          <div>
            <p class="eyebrow">Sports</p>
            <h2>Scoreboard</h2>
          </div>
          <span id="sports-status" class="status">Loading</span>
        </div>
        <div id="sports-list" class="stack"></div>
      </article>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
